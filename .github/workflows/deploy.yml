name: Deploy GPS Tracker a 4 EC2 Instances

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        instance: [1, 2, 3, 4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy a EC2 Instance ${{ matrix.instance }}
        env:
          HOST: ${{ secrets[format('EC2_HOST_{0}', matrix.instance)] }}
          USER: ${{ secrets[format('EC2_USER_{0}', matrix.instance)] }}
          KEY:  ${{ secrets[format('EC2_SSH_KEY_{0}', matrix.instance)] }}
        run: |
          echo "$KEY" > deploy_key
          chmod 600 deploy_key

          ssh -o StrictHostKeyChecking=no -i deploy_key ${USER}@${HOST} "cd ~/gps-tracker && git pull && npm install && pm2 restart gps-tracker"

          rm -f deploy_key
          echo "✅ Instancia ${{ matrix.instance }} actualizada"